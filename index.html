<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的永久商城</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Microsoft YaHei,sans-serif}
body{background:#f5f7fa;color:#333}
header{background:#ff3c3c;color:#fff;padding:16px 20px;text-align:center;position:sticky;top:0;z-index:10}
.search{background:#fff;padding:10px;text-align:center}
.search input{width:90%;padding:10px;border:1px solid #ddd;border-radius:30px;outline:none}
.banner{background:linear-gradient(90deg,#ff6b6b,#ff8888);color:#fff;text-align:center;padding:30px 10px;font-size:18px}
.nav{display:flex;justify-content:space-around;background:#fff;padding:12px 0;box-shadow:0 1px 3px #00000010}
.nav button{background:none;border:none;font-size:15px;color:#555}
.cate{padding:10px;background:#fff;margin-top:10px}
.cate h3{padding:10px;font-size:16px}
.goods{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:10px}
.good{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px #0000000a}
.good .pic{width:100%;height:130px;background:#eee}
.good .info{padding:10px}
.good .name{font-size:14px;margin-bottom:6px}
.good .price{color:#ff3c3c;font-weight:bold;font-size:16px}
.good button{background:#ff3c3c;color:#fff;border:none;width:100%;padding:8px 0;border-radius:6px;margin-top:8px}
.cart{padding:15px;background:#fff;margin:10px;border-radius:12px}
.cart h3{margin-bottom:10px}
.cart-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0}
.total{text-align:right;padding:10px;font-size:17px;color:#ff3c3c}
.pay{background:#ff3c3c;color:#fff;border:none;width:100%;padding:12px 0;border-radius:8px;margin-top:10px}
.user{padding:20px;background:#fff;margin:10px;border-radius:12px;text-align:center}
.user h3{margin-bottom:10px}
.page{display:none}
.page.active{display:block}
</style>
</head>
<body>

<header>我的永久商城</header>

<div class="search">
    <input type="text" placeholder="搜索商品">
</div>

<div class="banner">
    欢迎光临 · 永久免费商城
</div>

<div class="nav">
    <button onclick="go('home')">首页</button>
    <button onclick="go('cart')">购物车</button>
    <button onclick="go('user')">会员中心</button>
</div>

<!-- 首页 -->
<div id="home" class="page active">
    <div class="cate">
        <h3>热门商品</h3>
        <div class="goods">
            <div class="good">
                <div class="pic"></div>
                <div class="info">
                    <div class="name">纯棉T恤</div>
                    <div class="price">¥59</div>
                    <button onclick="add('纯棉T恤',59)">加入购物车</button>
                </div>
            </div>
            <div class="good">
                <div class="pic"></div>
                <div class="info">
                    <div class="name">休闲长裤</div>
                    <div class="price">¥89</div>
                    <button onclick="add('休闲长裤',89)">加入购物车</button>
                </div>
            </div>
            <div class="good">
                <div class="pic"></div>
                <div class="info">
                    <div class="name">透气运动鞋</div>
                    <div class="price">¥169</div>
                    <button onclick="add('透气运动鞋',169)">加入购物车</button>
                </div>
            </div>
            <div class="good">
                <div class="pic"></div>
                <div class="info">
                    <div class="name">时尚背包</div>
                    <div class="price">¥99</div>
                    <button onclick="add('时尚背包',99)">加入购物车</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 购物车 -->
<div id="cart" class="page">
    <div class="cart">
        <h3>购物车</h3>
        <div id="list"></div>
        <div class="total">合计：¥<span id="total">0</span></div>
        <button class="pay">结算订单</button>
    </div>
</div>

<!-- 会员中心 -->
<div id="user" class="page">
    <div class="user">
        <h3>会员中心</h3>
        <p>用户名：subo889</p>
        <p>订单管理 | 收货地址 | 客服中心</p>
    </div>
</div>

<script>
var cart = []
function add(name,price){
    cart.push({name,price})
    show()
    alert("已加入购物车")
}
function show(){
    var list = document.getElementById("list")
    var total = document.getElementById("total")
    list.innerHTML = ""
    var sum = 0
    cart.forEach((item,i)=>{
        sum += item.price
        list.innerHTML += `
        <div class="cart-item">
            <div>${item.name}</div>
            <div>¥${item.price} <button onclick="del(${i})">×</button></div>
        </div>`
    })
    total.innerText = sum
}
function del(i){
    cart.splice(i,1)
    show()
}
function go(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
    document.getElementById(id).classList.add('active')
}
</script>

</body>
</html>
