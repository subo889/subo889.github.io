<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subo889 商城</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif}
body{background:#f4f6f8}
.header{background:#ff3052;color:#fff;padding:14px 20px;text-align:center}
.banner{height:110px;background:linear-gradient(90deg,#ff4a6a,#ff6b4a);color:#fff;display:flex;align-items:center;justify-content:center}
.tabs{display:flex;background:#fff}
.tabs button{flex:1;padding:12px;border:none;background:none}
.tabs .active{color:#ff3052;font-weight:bold}
.page{display:none}
.show{display:block}
.goods{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:10px}
.good{background:#fff;border-radius:12px;overflow:hidden}
.good-img{height:140px;background:#eee}
.good-info{padding:10px}
.good-name{font-size:14px}
.good-price{color:#ff3052;font-weight:bold}
.good-btn{background:#ff3052;color:#fff;border:none;width:100%;padding:7px;border-radius:6px;margin-top:8px}
.cart{padding:15px;background:#fff;margin:10px;border-radius:12px}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f2f2f2}
.quantity{display:flex;align-items:center;gap:6px}
.quantity button{width:26px;height:26px;border:none;background:#f5f5f5;border-radius:4px}
.total{text-align:right;padding:10px;color:#ff3052}
.pay{background:#ff3052;color:#fff;border:none;width:100%;padding:12px;border-radius:8px;margin-top:10px}
.order{padding:15px;background:#fff;margin:10px;border-radius:12px}

/* 客服悬浮 */
.service-float{position:fixed;right:15px;bottom:15px;z-index:999}
.service-btn{width:50px;height:50px;border-radius:50%;background:#ff3052;color:#fff;border:none}
.chat-box{width:320px;height:400px;background:#fff;position:fixed;right:15px;bottom:75px;display:none;flex-direction:column}
.chat-head{background:#ff3052;color:#fff;padding:10px}
.chat-content{flex:1;padding:10px;overflow-y:auto;background:#f9f9f9}
.msg-user{text-align:right;margin:8px 0}
.msg-admin{text-align:left;margin:8px 0}
.msg-content{display:inline-block;padding:6px 10px;border-radius:6px;max-width:70%}
.msg-user .msg-content{background:#ff3052;color:#fff}
.msg-admin .msg-content{background:#e5e5e5}
.chat-input{display:flex;padding:8px}
.chat-input input{flex:1;padding:8px}
.chat-input button{margin-left:6px;background:#ff3052;color:#fff;border:none;padding:8px 12px}
</style>
</head>
<body>

<div class="header">Subo889 商城</div>
<div class="banner">欢迎光临</div>

<div class="tabs">
    <button onclick="goto('shop')" class="active">商城</button>
    <button onclick="goto('cart')">购物车</button>
    <button onclick="goto('order')">订单</button>
</div>

<!-- 商城 -->
<div id="shop" class="page show">
    <div style="padding:10px;background:#fff;margin:10px;border-radius:12px">
        <h3 style="padding:10px">全部商品</h3>
        <div class="goods" id="goodsList"></div>
    </div>
</div>

<!-- 购物车 -->
<div id="cart" class="page">
    <div class="cart">
        <h3>购物车</h3>
        <div id="cartItems"></div>
        <div class="total">合计：¥<span id="total">0</span></div>
        <button class="pay" onclick="pay()">提交订单</button>
    </div>
</div>

<!-- 订单 -->
<div id="order" class="page">
    <div class="order">
        <h3>我的订单</h3>
        <div id="orderItems"></div>
    </div>
</div>

<!-- 客服 -->
<div class="service-float">
    <button class="service-btn" onclick="toggleChat()">客服</button>
</div>
<div class="chat-box" id="chatBox">
    <div class="chat-head">客服中心 <span onclick="toggleChat()" style="float:right">×</span></div>
    <div class="chat-content" id="chatContent"></div>
    <div class="chat-input">
        <input id="userMsg" placeholder="输入消息">
        <button onclick="userSend()">发送</button>
    </div>
</div>

<script>
let goods = JSON.parse(localStorage.getItem('goods')) || [
    {name:'纯棉T恤',price:59},{name:'休闲长裤',price:89},{name:'运动鞋',price:169},{name:'时尚背包',price:99}
]
let cart = JSON.parse(localStorage.getItem('cart')) || []
let orders = JSON.parse(localStorage.getItem('orders')) || []
let chatMsg = JSON.parse(localStorage.getItem('chatMsg')) || []

function render(){
    let g = document.getElementById('goodsList')
    g.innerHTML = ''
    goods.forEach((it,i)=>{
        g.innerHTML+=`
        <div class="good">
            <div class="good-img"></div>
            <div class="good-info">
                <div class="good-name">${it.name}</div>
                <div class="good-price">¥${it.price}</div>
                <button class="good-btn" onclick="addCart(${i})">加入购物车</button>
            </div>
        </div>`
    })
    showCart()
    showOrder()
    renderChat()
}

function addCart(i){
    let item = goods[i]
    let idx = cart.findIndex(x=>x.name==item.name)
    if(idx>=0) cart[idx].num++
    else cart.push({name:item.name,price:item.price,num:1})
    save()
    alert('已加入购物车')
}

function showCart(){
    let c = document.getElementById('cartItems')
    let t = document.getElementById('total')
    c.innerHTML = ''
    let sum=0
    cart.forEach((it,i)=>{
        sum+=it.price*it.num
        c.innerHTML+=`
        <div class="cart-item">
            <div>${it.name}</div>
            <div class="quantity">
                <button onclick="cut(${i})">-</button>
                <span>${it.num}</span>
                <button onclick="add(${i})">+</button>
            </div>
            <div>¥${it.price*it.num}</div>
        </div>`
    })
    t.innerText=sum
}

function cut(i){ cart[i].num--; if(cart[i].num<1) cart.splice(i,1); save(); }
function add(i){ cart[i].num++; save(); }

function pay(){
    if(cart.length==0) return alert('购物车为空')
    orders.push({items:cart,total:document.getElementById('total').innerText,time:new Date().toLocaleString()})
    cart=[]
    save()
    alert('订单提交成功')
}

function showOrder(){
    let o = document.getElementById('orderItems')
    o.innerHTML=''
    orders.forEach(it=>{
        o.innerHTML+=`<div style="padding:10px;border-bottom:1px solid #f2f2f2">${it.time}<br>金额：¥${it.total}</div>`
    })
}

function toggleChat(){
    let box = document.getElementById('chatBox')
    box.style.display = box.style.display === 'flex' ? 'none' : 'flex'
}

function userSend(){
    let input = document.getElementById('userMsg')
    let text = input.value.trim()
    if(!text) return
    chatMsg.push({type:'user',text:text})
    input.value = ''
    save()
    renderChat()
}

function renderChat(){
    let content = document.getElementById('chatContent')
    content.innerHTML = ''
    chatMsg.forEach(msg=>{
        if(msg.type === 'user') content.innerHTML += `<div class="msg-user"><span class="msg-content">${msg.text}</span></div>`
        else content.innerHTML += `<div class="msg-admin"><span class="msg-content">${msg.text}</span></div>`
    })
    content.scrollTop = content.scrollHeight
}

function save(){
    localStorage.setItem('goods',JSON.stringify(goods))
    localStorage.setItem('cart',JSON.stringify(cart))
    localStorage.setItem('orders',JSON.stringify(orders))
    localStorage.setItem('chatMsg',JSON.stringify(chatMsg))
    render()
}

function goto(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'))
    document.getElementById(id).classList.add('show')
    document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'))
    document.querySelectorAll('.tabs button')[['shop','cart','order'].indexOf(id)].classList.add('active')
}

render()
</script>
</body>
</html>
}
render()
</script>
</body>
</html>
