<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subo889 商城 - 带后台管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif}
body{background:#f4f6f8}
.header{background:#ff3052;color:#fff;padding:14px 20px;text-align:center;position:sticky;top:0;z-index:10}
.search{background:#fff;padding:10px;text-align:center}
.search input{width:92%;padding:10px 14px;border-radius:30px;border:1px solid #eee;background:#f7f7f7;outline:none}
.banner{height:110px;background:linear-gradient(90deg,#ff4a6a,#ff6b4a);color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px}
.tabs{display:flex;background:#fff;box-shadow:0 1px 3px #00000010}
.tabs button{flex:1;padding:12px;border:none;background:none;color:#666}
.tabs .active{color:#ff3052;font-weight:bold}
.page{display:none}
.show{display:block}
.goods{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:10px}
.good{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 6px #00000007}
.good-img{height:140px;background:#eee}
.good-info{padding:10px}
.good-name{font-size:14px;margin-bottom:6px}
.good-price{color:#ff3052;font-weight:bold}
.good-btn{background:#ff3052;color:#fff;border:none;width:100%;padding:7px;border-radius:6px;margin-top:8px}
.cart{padding:15px;background:#fff;margin:10px;border-radius:12px}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f2f2f2}
.quantity{display:flex;align-items:center;gap:6px}
.quantity button{width:26px;height:26px;border:none;background:#f5f5f5;border-radius:4px}
.total{text-align:right;padding:10px;color:#ff3052;font-size:17px}
.pay{background:#ff3052;color:#fff;border:none;width:100%;padding:12px;border-radius:8px;margin-top:10px}
.order{padding:15px;background:#fff;margin:10px;border-radius:12px}
.order-item{padding:10px;border-bottom:1px solid #f2f2f2}
.admin{padding:20px;background:#fff;margin:10px;border-radius:12px}
.admin input{width:100%;padding:10px;margin:6px 0;border:1px solid #eee;border-radius:6px}
.admin button{background:#ff3052;color:#fff;border:none;padding:10px;width:100%;border-radius:6px;margin-top:6px}
.admin-panel{padding:15px;background:#fff;margin:10px;border-radius:12px}
.admin-item{padding:8px;border-bottom:1px solid #f2f2f2}
</style>
</head>
<body>

<div class="header">Subo889 永久商城（带后台）</div>
<div class="search"><input placeholder="搜索商品"></div>
<div class="banner">永久免费 · 自带管理后台</div>

<div class="tabs">
    <button onclick="goto('shop')" class="active">商城</button>
    <button onclick="goto('cart')">购物车</button>
    <button onclick="goto('order')">订单</button>
    <button onclick="goto('admin')">后台管理</button>
</div>

<!-- 商城 -->
<div id="shop" class="page show">
    <div style="padding:10px;background:#fff;margin:10px;border-radius:12px">
        <h3 style="padding:10px">全部商品</h3>
        <div class="goods" id="goodsList"></div>
    </div>
</div>

<!-- 购物车 -->
<div id="cart" class="page">
    <div class="cart">
        <h3>购物车</h3>
        <div id="cartItems"></div>
        <div class="total">合计：¥<span id="total">0</span></div>
        <button class="pay" onclick="pay()">提交订单</button>
    </div>
</div>

<!-- 订单 -->
<div id="order" class="page">
    <div class="order">
        <h3>我的订单</h3>
        <div id="orderItems"></div>
    </div>
</div>

<!-- 后台管理 -->
<div id="admin" class="page">
    <div class="admin">
        <h3>后台管理中心</h3>
        <input id="gname" placeholder="商品名称">
        <input id="gprice" placeholder="商品价格">
        <button onclick="addGood()">添加商品</button>
    </div>
    <div class="admin-panel">
        <h4>商品管理</h4>
        <div id="adminGoods"></div>
    </div>
    <div class="admin-panel">
        <h4>订单管理</h4>
        <div id="adminOrders"></div>
    </div>
</div>

<script>
let goods = JSON.parse(localStorage.getItem('goods')) || [
    {name:'纯棉T恤',price:59},
    {name:'休闲长裤',price:89},
    {name:'运动鞋',price:169},
    {name:'时尚背包',price:99}
]
let cart = JSON.parse(localStorage.getItem('cart')) || []
let orders = JSON.parse(localStorage.getItem('orders')) || []

function render(){
    let g = document.getElementById('goodsList')
    g.innerHTML = ''
    goods.forEach((it,i)=>{
        g.innerHTML+=`
        <div class="good">
            <div class="good-img"></div>
            <div class="good-info">
                <div class="good-name">${it.name}</div>
                <div class="good-price">¥${it.price}</div>
                <button class="good-btn" onclick="addCart(${i})">加入购物车</button>
            </div>
        </div>`
    })
    showCart()
    showOrder()
    adminShow()
}

function addCart(i){
    let item = goods[i]
    let idx = cart.findIndex(x=>x.name==item.name)
    if(idx>=0) cart[idx].num++
    else cart.push({name:item.name,price:item.price,num:1})
    save()
    alert('已加入购物车')
}

function showCart(){
    let c = document.getElementById('cartItems')
    let t = document.getElementById('total')
    c.innerHTML = ''
    let sum=0
    cart.forEach((it,i)=>{
        sum+=it.price*it.num
        c.innerHTML+=`
        <div class="cart-item">
            <div>${it.name}</div>
            <div class="quantity">
                <button onclick="cut(${i})">-</button>
                <span>${it.num}</span>
                <button onclick="add(${i})">+</button>
            </div>
            <div>¥${it.price*it.num}</div>
        </div>`
    })
    t.innerText=sum
}

function cut(i){ cart[i].num--; if(cart[i].num<1) cart.splice(i,1); save(); }
function add(i){ cart[i].num++; save(); }
function pay(){
    if(cart.length==0) return alert('购物车为空')
    orders.push({items:cart,total:document.getElementById('total').innerText,time:new Date().toLocaleString()})
    cart=[]
    save()
    alert('订单提交成功')
}

function showOrder(){
    let o = document.getElementById('orderItems')
    o.innerHTML=''
    orders.forEach(it=>{
        o.innerHTML+=`<div class="order-item">${it.time}<br>金额：¥${it.total}</div>`
    })
}

function addGood(){
    let name = document.getElementById('gname').value
    let price = document.getElementById('gprice').value
    if(!name||!price) return alert('请填写完整')
    goods.push({name,price:Number(price)})
    save()
    alert('商品添加成功')
    document.getElementById('gname').value=''
    document.getElementById('gprice').value=''
}

function adminShow(){
    let ag = document.getElementById('adminGoods')
    let ao = document.getElementById('adminOrders')
    ag.innerHTML=''
    goods.forEach((it,i)=>{
        ag.innerHTML+=`<div class="admin-item">${it.name} - ¥${it.price} <button onclick="delGood(${i})" style="background:red;color:white;border:none;padding:4px">删除</button></div>`
    })
    ao.innerHTML=''
    orders.forEach(it=>{
        ao.innerHTML+=`<div class="admin-item">${it.time} → 订单金额：¥${it.total}</div>`
    })
}

function delGood(i){ goods.splice(i,1); save(); }
function save(){
    localStorage.setItem('goods',JSON.stringify(goods))
    localStorage.setItem('cart',JSON.stringify(cart))
    localStorage.setItem('orders',JSON.stringify(orders))
    render()
}
function goto(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'))
    document.getElementById(id).classList.add('show')
    document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'))
    document.querySelectorAll('.tabs button')[['shop','cart','order','admin'].indexOf(id)].classList.add('active')
}
render()
</script>
</body>
</html>
